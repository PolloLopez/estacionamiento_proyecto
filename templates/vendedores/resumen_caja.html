{% extends "base.html" %}
{% block title %}Caja{% endblock %}

{% block content %}

<div class="container">

  <div class="panel">
    <div class="panel-body">

      <h1>💰 Resumen de caja</h1>

      <table class="table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Patente</th>
            <th>Monto</th>
          </tr>
        </thead>

        <tbody>
          {% for c in cobros %}
          <tr>
            <td>{{ c.fecha }}</td>
            <td>{{ c.vehiculo.patente }}</td>
            <td>${{ c.monto }}</td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3">Sin movimientos</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>
  </div>

</div>

{% endblock %}
