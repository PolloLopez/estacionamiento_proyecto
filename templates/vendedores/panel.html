{% extends "base.html" %}
{% block title %}Panel Vendedor{% endblock %}

{% block content %}

<div class="container">

  <div class="panel">
    <div class="panel-body">

      <h1>💼 Panel vendedor</h1>

      <div class="grid grid-2">

        <div class="card">
          <h3>💰 Caja del día</h3>
          <p class="success">$ {{ total_hoy }}</p>
        </div>

        <div class="card">
          <h3>🚗 Operaciones</h3>
          <p>{{ cantidad_operaciones }} registros</p>
        </div>

      </div>

      <div style="margin-top:1.2rem; display:flex; gap:0.75rem; flex-wrap:wrap;">
        <a class="btn" href="{% url 'vendedores_registrar_estacionamiento' %}">
          ➕ Registrar estacionamiento
        </a>
        <a class="btn btn-outline" href="{% url 'vendedores_resumen_caja' %}">
          📊 Ver resumen
        </a>
      </div>

    </div>
  </div>

</div>

{% endblock %}
