<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ticket</title>

  <style>
    body {
      font-family: monospace;
      text-align: center;
    }

    .ticket {
      width: 250px;
      margin: auto;
    }

    hr {
      border: none;
      border-top: 1px dashed black;
      margin: 10px 0;
    }
  </style>
  <style>@media print { .no-print { display:none; } }</style>
</head>
<body onload="window.print()">

  <div class="ticket">

    <h3>ESTACIONAMIENTO</h3>
    <p>Municipio</p>

    <hr>

    <p><b>Patente:</b> {{ patente }}</p>
    <p><b>Duración:</b> {{ duracion }} hs</p>
    <p><b>Inicio:</b> {{ hora }}</p>
    <p><b>Monto:</b> ${{ monto }}</p>

    <hr>

    <p>Gracias por su pago</p>

  </div>

  <div style="margin-top:1.5rem; text-align:center;" class="no-print">
    <button onclick="window.print()" style="margin-right:0.5rem; padding:0.5rem 1rem;
            font-size:0.95rem; cursor:pointer;">🖨 Imprimir</button>
    <button onclick="history.back()" style="padding:0.5rem 1rem;
            font-size:0.95rem; cursor:pointer;">← Volver</button>
  </div>

</body>
<script>
function imprimirTicket() {
  const contenido = `
    <h3>Estacionamiento</h3>
    <p>Patente: {{ patente }}</p>
    <p>Duración: {{ duracion }} hs</p>
    <p>Fecha: ${new Date().toLocaleString()}</p>
  `;

  const w = window.open("", "", "width=300,height=400");
  w.document.write(contenido);
  w.document.close();
  w.print();

    window.onload = () => {
    window.print();
  };
}
</script>
</html>
