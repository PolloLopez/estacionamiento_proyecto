{% extends "base.html" %} {% block title %}Estacionar rápido{% endblock %} {%
block content %}

<section class="container">
  <div class="panel">
    <h2>Estacionamiento rápido</h2>

    <div class="panel-body">
      <p>Formulario minimal para registrar un estacionamiento sin cuenta.</p>

      <form method="post" action="{% url 'usuarios_estacionar_vehiculo' %}">
        {% csrf_token %}
        <div class="form-row">
          <label>Patente</label>
          <input name="patente" required oninput="this.value = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase()" />
        </div>
        <div class="form-row">
          <label>Tipo</label>
          <select name="tipo">
            <option value="auto">Auto</option>
            <option value="moto">Moto</option>
          </select>
        </div>
        <div class="form-row">
          <label>Duración</label>
          <input type="number" name="duracion" min="1" value="1" />
        </div>
        <div class="form-row actions">
          <button class="btn-general">Generar</button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
