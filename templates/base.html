<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    {% load static %}

    <title>{% block title %} Estacionamiento Medido {% endblock %}</title>

    <link
      rel="stylesheet"
      href="{% static 'app_estacionamiento/css/global.css' %}"
    />
  </head>

  <body>
    <header>
      <a href="{% url 'inicio' %}"> Inicio </a>

      {% if request.user.is_authenticated %}

      <a href="{% url 'logout' %}"> Salir </a>

      {% else %}

      <a href="{% url 'login' %}"> Login </a>

      {% endif %}
    </header>

    <main>{% block content %} {% endblock %}</main>
  </body>
</html>
