{% extends "base.html" %}
{% block title %}Contraseña actualizada — EstacionAR{% endblock %}

{% block content %}
<section class="container" style="max-width:440px; margin:3rem auto; padding:0 1rem;">
  <div class="card" style="padding:2rem; text-align:center;">
    <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
    <h2 style="margin-bottom:0.75rem;">¡Contraseña actualizada!</h2>
    <p style="color:var(--color-text-muted); margin-bottom:1.5rem; font-size:0.95rem;">
      Tu contraseña fue cambiada correctamente. Ya podés iniciar sesión.
    </p>
    <a href="{% url 'login' %}" class="btn">Iniciar sesión</a>
  </div>
</section>
{% endblock %}
