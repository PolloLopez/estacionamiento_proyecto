{% extends "base.html" %}
{% block title %}Inspector: {{ inspector.nombre|default:inspector.correo }}{% endblock %}

{% block content %}
<section class="container">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem;">
    <h2>👮 {{ inspector.nombre|default:inspector.correo }}</h2>
    <a href="{% url 'gestionar_inspectores' %}" class="btn btn-outline" style="font-size:0.9rem;">← Volver</a>
  </div>




    <!-- CONFIG + DATOS (colapsado visualmente, secundario) -->
  <form method="post" action="{% url 'admin_editar_inspector' inspector.id %}">
    {% csrf_token %}

    <div style="margin-bottom:1rem;">

      <div class="card">
        <h3 style="margin-bottom:0.8rem;">Datos personales</h3>

        <label>Nombre completo</label>
        <input name="nombre" value="{{ inspector.nombre }}" placeholder="Nombre completo" />

        <div class="grid grid-2" style="gap:1rem;">
          <div>
            <label>DNI</label>
            <input name="numero_dni" value="{{ inspector.numero_dni }}" placeholder="Ej: 30123456" />
          </div>
          <div>
            <label>Legajo (opcional)</label>
            <input name="numero_legajo" value="{{ inspector.numero_legajo }}" placeholder="Ej: 00142" />
          </div>
        </div>

        <label>Teléfono</label>
        <input name="telefono" value="{{ inspector.telefono }}" placeholder="Ej: 2324 123456" />

        <label>Correo (solo lectura)</label>
        <input value="{{ inspector.correo }}" disabled
               style="background:var(--color-surface-2); color:var(--color-text-muted);" />

        <label style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0; cursor:pointer; font-weight:600;">
          <input type="checkbox" name="activo" {% if inspector.is_active %}checked{% endif %}
                 style="width:18px; height:18px;">
          Usuario activo
        </label>
      </div>


    </div>

    <button class="btn" type="submit">💾 Guardar cambios</button>
  </form>

</section>
{% endblock %}
