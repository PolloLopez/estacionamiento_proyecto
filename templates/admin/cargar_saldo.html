{% extends "base.html" %} {% block title %}Cargar saldo{% endblock %} {% block
content %}
<section class="container">
  <div class="panel">
    <h1>Cargar saldo a {{ request.user.correo }}</h1>
    <div class="panel-body">
      {% if error %}
      <p style="color: red">{{ error }}</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="monto">Monto:</label>
        <input id="monto" name="monto" type="number" step="0.01" required />
        <button class="btn-general">Cargar</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
