{% extends "base.html" %}

{% block title %}Exenciones{% endblock %}

{% block content %}
<section class="container">
  <div class="card">
    <h2>🚧 Panel de Exenciones</h2>

    <form method="POST" class="grid">
        {% csrf_token %}
        <input type="hidden" name="accion" value="buscar">

        <label>Patente:</label>
        <input type="text" name="patente" class="input" required>

        <button type="submit" class="btn">Buscar</button>
    </form> 
  </div>

  {% if vehiculo %}
  <div class="card" style="margin-top: 1rem;">
    <h3>Vehículo: {{ vehiculo.patente }}</h3>

    <form method="POST" class="grid">
        {% csrf_token %}
        <input type="hidden" name="accion" value="guardar">
        <input type="hidden" name="patente" value="{{ vehiculo.patente }}">

        <label>
            <input type="checkbox" name="exento_global"
            {% if vehiculo.exento_global %}checked{% endif %}>
            Exento global
        </label>

        <h4>Subcuadras exentas</h4>

        <input type="text" id="buscador" class="input" placeholder="Buscar calle...">

        <div id="lista-subcuadras" class="grid">
            {% for s in subcuadras %}
                <div class="card">
                    <label>
                        <input type="checkbox" name="subcuadras" value="{{ s.id }}"
                        {% if s in vehiculo.subcuadras_exentas.all %}checked{% endif %}>
                        {{ s.calle }} {{ s.altura }}
                    </label>
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn">Guardar</button>
    </form>
  </div>
  {% endif %}
</section>

<script>
document.getElementById("buscador")?.addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    let items = document.querySelectorAll("#lista-subcuadras div");

    items.forEach(item => {
        let texto = item.innerText.toLowerCase();
        item.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>
{% endblock %}
