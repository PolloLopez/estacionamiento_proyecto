<h2>Panel de Exenciones</h2>

<form method="POST">
    {% csrf_token %}

    <label>Patente:</label>
    <input type="text" name="patente" required>

    <button type="submit">Buscar</button>
</form>

{% if vehiculo %}
<hr>

<h3>Vehículo: {{ vehiculo.patente }}</h3>

<form method="POST">
    {% csrf_token %}
    <input type="hidden" name="patente" value="{{ vehiculo.patente }}">

    <label>
        <input type="checkbox" name="exento_global"
        {% if vehiculo.exento_global %}checked{% endif %}>
        Exento global
    </label>

    <h4>Subcuadras exentas</h4>

    <input type="text" id="buscador" placeholder="Buscar calle...">

    <div id="lista-subcuadras">
        {% for s in subcuadras %}
            <div>
                <label>
                    <input type="checkbox" name="subcuadras" value="{{ s.id }}"
                    {% if s in vehiculo.subcuadras_exentas.all %}checked{% endif %}>
                    {{ s.calle }} {{ s.altura }}
                </label>
            </div>
        {% endfor %}
    </div>

    <button type="submit">Guardar</button>
</form>
{% endif %}

<script>
document.getElementById("buscador").addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    let items = document.querySelectorAll("#lista-subcuadras div");

    items.forEach(item => {
        let texto = item.innerText.toLowerCase();
        item.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>
