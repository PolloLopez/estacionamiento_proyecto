{% extends "base.html" %}
{% block title %}Ingresar con Google{% endblock %}

{% block content %}
<section class="container" style="max-width:420px;">
  <div class="panel auth-panel" style="margin-top:3rem; text-align:center;">

    <div style="font-size:2.5rem; margin-bottom:0.5rem;">🔑</div>
    <h2 style="margin-bottom:0.4rem;">Ingresar con Google</h2>
    <p style="color:var(--color-text-muted); font-size:0.95rem; margin-bottom:1.5rem;">
      Vas a continuar usando tu cuenta de Google.
    </p>

    <form method="post" action="{{ request.path }}">
      {% csrf_token %}
      {% for field in form %}{{ field }}{% endfor %}
      <button type="submit" class="btn" style="width:100%; font-size:1rem;">
        Continuar con Google
      </button>
    </form>

    <div style="margin-top:1rem;">
      <a href="{% url 'login' %}" style="font-size:0.9rem; color:var(--color-text-muted);">
        ← Volver
      </a>
    </div>

  </div>
</section>
{% endblock %}
