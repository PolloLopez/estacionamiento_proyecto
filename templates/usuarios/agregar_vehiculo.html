{% extends "base.html" %}
{% block title %}Agregar vehículo{% endblock %}

{% block content %}
<section class="container">
  <div class="panel">
    <h2>Agregar vehículo</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <label for="patente">Patente</label>
        <input id="patente" name="patente" maxlength="10" required autofocus
                   oninput="this.value = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase()"
               style="text-transform:uppercase" />
      </div>
      <div class="form-row">
        <label>Tipo de vehículo</label>
        <div style="display:flex; gap:1.5rem; margin-top:0.4rem;">
          <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
            <input type="radio" name="tipo" value="auto" checked /> 🚗 Auto
          </label>
          <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
            <input type="radio" name="tipo" value="moto" /> 🏍️ Moto
          </label>
        </div>
      </div>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <div class="form-row actions">
        <button class="btn-general" type="submit">Agregar</button>
        <a href="{% url 'inicio_usuarios' %}">Cancelar</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
