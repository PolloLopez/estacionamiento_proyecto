{% extends "base.html" %}
{% block title %}Consultar Deuda{% endblock %}

{% block content %}
<section class="container">
  <div class="panel">
    <h2>Consultar deuda por vehículo</h2>
    <div class="panel-body">
      <form method="get">
        <div class="form-row">
          <label>Patente</label>
          <input name="patente" placeholder="ABC123" />
        </div>
        <div class="form-row actions">
          <button class="btn">Consultar</button>
        </div>
      </form>

      {% if deuda is not None %}
      <div class="card">
        <p>Total deuda: <strong>${{ deuda.total }}</strong></p>
      </div>
      {% endif %}

      <p>
        <a href="{% url 'inicio_usuarios' %}">Volver</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
