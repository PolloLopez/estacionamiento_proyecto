{% extends "base.html" %}
{% block title %}Estacionamiento — Ingresar{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h2>Iniciar sesión</h2>
  <form method="post" action="{% url 'login' %}">
  {% csrf_token %}

  <a href="/accounts/google/login/" class="btn btn-google">
    Ingresar con Google
  </a>
  <hr style="margin: 1rem 0;">

  <label>Correo</label>
  <input type="email" name="correo" required>

  <label>Contraseña</label>
  <input type="password" name="password" required>

  <button type="submit" class="btn" style="width:100%;">Entrar</button>

  {% if form.errors %}
    <p class="error">Correo o contraseña incorrectos</p>
  {% endif %}

  <div style="margin-top:1rem; font-size:0.9rem; text-align:center; color:var(--color-text-muted);">
    <a href="{% url 'registro' %}">¿No tenés cuenta? Registrate</a>
    &nbsp;·&nbsp;
    <a href="{% url 'account_reset_password' %}">¿Olvidaste tu contraseña?</a>
  </div>
</form>
</section>
{% endblock %}
